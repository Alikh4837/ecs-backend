services:
  - type: web
    name: your-backend-name
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn backend.wsgi
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: your-app-name.onrender.com,localhost
      - key: DATABASE_URL
        fromDatabase:
          name: your-db-name
          property: connectionString

databases:
  - name: your-db-name
    databaseName: your-db-name
    user: your-db-user